<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IDENTICA</title>
  <style>
    :root {
      --bg: #f6f1ea;
      --ink: #241f1c;
      --line: #dfd0c4;
      --accent: #b2481f;
      --accent-2: #d7835f;
      --shadow: 0 16px 36px rgba(40, 28, 21, 0.14);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      font-family: "Segoe UI", "Helvetica Neue", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(178, 72, 31, 0.14), transparent 42%),
        radial-gradient(circle at 80% 90%, rgba(194, 130, 143, 0.14), transparent 40%),
        var(--bg);
      display: grid;
      grid-template-rows: 1fr auto;
    }

    .app-screen {
      width: min(520px, 100%);
      margin: 0 auto;
      background: #fff;
      box-shadow: var(--shadow);
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      min-height: 100vh;
    }

    iframe {
      width: 100%;
      height: 100dvh;
      border: 0;
      display: block;
      background: #fff;
    }

    @media (min-width: 900px) {
      .app-screen {
        margin-top: 0;
        margin-bottom: 0;
      }
    }
  </style>
</head>
<body>
  <main class="app-screen">
    <iframe id="appFrame" title="IDENTICA" loading="eager"></iframe>
  </main>

  <script>
    const routes = [
      { id: "inicio", title: "Inicio", path: "bienvenida_3/code.html" },
      { id: "perfil", title: "Formulario", path: "formulario_de_datos_2/code.html" },
      { id: "foto", title: "Carga de imagen", path: "carga_de_imagen_3/code.html" },
      { id: "analisis", title: "Analisis IA", path: "an_lisis_ia_2/code.html" },
      { id: "resultados", title: "Resultados", path: "resultados_personalizados_2/code.html" },
      { id: "outfits", title: "Outfits", path: "outfits_recomendados/code.html" },
      { id: "final", title: "Final", path: "pantalla_final_2/code.html" }
    ];

    const STORAGE_KEY = "identica-current-route";
    const frame = document.getElementById("appFrame");

    let currentIndex = 0;
    let lastAppliedHash = "";

    function getRouteIndexById(routeId) {
      return routes.findIndex((route) => route.id === routeId);
    }

    function getCurrentRoute() {
      return routes[currentIndex];
    }

    function getNextRoute() {
      return routes[currentIndex + 1] || routes[0];
    }

    function readInitialRouteId() {
      // Requerimiento demo: cada recarga reinicia el programa en toma de datos.
      localStorage.removeItem(STORAGE_KEY);
      globalThis.__identicaSessionStore = {};
      return "inicio";
    }

    function setHash(routeId) {
      if (lastAppliedHash === routeId) return;
      lastAppliedHash = routeId;
      globalThis.location.hash = routeId;
    }

    function navigateTo(routeId, updateHash = false) {
      const index = getRouteIndexById(routeId);
      if (index < 0) return;

      currentIndex = index;
      const route = getCurrentRoute();

      frame.src = route.path;
      localStorage.setItem(STORAGE_KEY, route.id);

      if (updateHash) setHash(route.id);
    }

    function goNext(updateHash = true) {
      navigateTo(getNextRoute().id, updateHash);
    }

    function routeFromIntent(text) {
      const value = (text || "").toLowerCase().trim();
      if (!value) return null;

      if (value.includes("comenzar")) return "perfil";
      if (value.includes("continuar")) return "foto";
      if (value.includes("ver resultados")) return "resultados";
      if (value.includes("ver detalles")) return "final";
      if (value.includes("comprar segun mi perfil") || value.includes("recomendaciones completas") || value.includes("comprar")) return "outfits";
      if (value.includes("guardar resultados")) return "final";
      if (value.includes("volver a analizar")) return "foto";
      if (value.includes("regresar al inicio")) return "inicio";

      if (value.includes("studio")) return "inicio";
      if (value.includes("analyze") || value.includes("analizar")) return "analisis";
      if (value.includes("wardrobe") || value.includes("armario") || value.includes("apparel")) return "outfits";
      if (value.includes("profile") || value.includes("perfil")) return "perfil";

      return null;
    }

    function bindFrameClickNavigation() {
      try {
        const doc = frame.contentDocument;
        if (!doc) return;

        doc.addEventListener("click", (event) => {
          const target = event.target;
          if (!target) return;

          const clickable = target.closest("button, a");
          if (!clickable) return;

          const activeRoute = getCurrentRoute();
          const rawText = clickable.textContent || "";
          const normalizedText = rawText.toLowerCase().trim();

          // En pantalla de foto dejamos que Subir/Camara/Galeria ejecuten su seleccion nativa.
          if (
            activeRoute &&
            activeRoute.id === "foto" &&
            (normalizedText.includes("subir imagen") ||
              normalizedText.includes("subir foto") ||
              normalizedText.includes("camara") ||
              normalizedText.includes("galeria"))
          ) {
            return;
          }

          const destination = routeFromIntent(rawText);
          if (!destination) return;

          event.preventDefault();
          navigateTo(destination, true);
        });
      } catch {
        // Same-origin expected. If not accessible, keep shell navigation only.
      }
    }

    frame.addEventListener("load", () => {
      bindFrameClickNavigation();
    });

    globalThis.addEventListener("hashchange", () => {
      const routeId = globalThis.location.hash.replace(/^#/, "").trim();
      if (!routeId) return;

      const currentRoute = getCurrentRoute();
      if (currentRoute && currentRoute.id === routeId) return;

      navigateTo(routeId, false);
    });

    navigateTo(readInitialRouteId(), false);
    setHash(getCurrentRoute().id);
  </script>
</body>
</html>
