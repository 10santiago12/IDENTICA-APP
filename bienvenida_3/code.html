<!DOCTYPE html><html lang="es"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "inverse-on-surface": "#f1f0f0",
                        "surface-container-highest": "#e3e2e1",
                        "surface-variant": "#e3e2e1",
                        "on-tertiary-fixed-variant": "#6b3743",
                        "primary-fixed-dim": "#ffb59c",
                        "tertiary-container": "#c2828f",
                        "on-secondary-container": "#745c00",
                        "outline-variant": "#e0bfc0",
                        "on-secondary-fixed": "#241a00",
                        "surface-container-lowest": "#ffffff",
                        "background": "#faf9f8",
                        "tertiary-fixed-dim": "#fbb3c1",
                        "tertiary-fixed": "#ffd9df",
                        "on-primary-fixed-variant": "#822800",
                        "on-primary-fixed": "#380c00",
                        "outline": "#8c7071",
                        "on-primary": "#ffffff",
                        "error-container": "#ffdad6",
                        "primary-container": "#ea6f42",
                        "on-primary-container": "#551700",
                        "on-tertiary-fixed": "#360c19",
                        "surface-container-high": "#e9e8e7",
                        "on-background": "#1a1c1c",
                        "surface-bright": "#faf9f8",
                        "on-tertiary": "#ffffff",
                        "on-error-container": "#93000a",
                        "inverse-primary": "#ffb59c",
                        "primary-fixed": "#ffdbcf",
                        "primary": "#a43c12",
                        "secondary-fixed-dim": "#e9c349",
                        "surface-dim": "#dadad9",
                        "secondary-fixed": "#ffe088",
                        "tertiary": "#864e5a",
                        "on-secondary-fixed-variant": "#574500",
                        "surface-container": "#eeeeed",
                        "surface-container-low": "#f4f3f2",
                        "on-surface": "#1a1c1c",
                        "on-surface-variant": "#584142",
                        "inverse-surface": "#2f3130",
                        "secondary": "#735c00",
                        "error": "#ba1a1a",
                        "secondary-container": "#fed65b",
                        "on-secondary": "#ffffff",
                        "surface": "#faf9f8",
                        "on-error": "#ffffff",
                        "surface-tint": "#a43c12",
                        "on-tertiary-container": "#4b1d29"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            background-color: #faf9f8;
            font-family: 'Manrope', sans-serif;
        }
        .editorial-shadow {
            box-shadow: 0px 12px 32px rgba(88, 65, 66, 0.06);
        }
        .asymmetric-gradient {
            background: radial-gradient(circle at 10% 20%, rgba(234, 111, 66, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 90% 80%, rgba(194, 130, 143, 0.08) 0%, transparent 50%);
        }
    </style>
<style>
        body {
            min-height: 100dvh;
        }
    </style>
</head>
<body class="bg-background text-on-surface overflow-y-auto">
<!-- Primary Canvas -->
<main class="relative min-h-screen w-full flex flex-col items-center justify-between asymmetric-gradient px-8 py-6 md:px-24 md:py-20">
<!-- Background Accents (Intentional Asymmetry) -->
<div class="absolute top-0 right-0 w-1/2 h-1/2 bg-primary-fixed opacity-10 rounded-bl-full filter blur-3xl pointer-events-none"></div>
<div class="absolute bottom-10 left-[-10%] w-[60%] h-[40%] bg-tertiary-container opacity-5 rounded-tr-full filter blur-2xl pointer-events-none"></div>
<!-- Header Section -->
<div class="relative z-10 w-full text-center">
<h1 class="font-headline font-bold text-5xl md:text-7xl tracking-tighter text-on-surface mb-2" style="">
                IDÉNTICA
            </h1>
<p class="font-label uppercase tracking-[0.2em] text-on-surface-variant text-xs md:text-sm font-semibold opacity-80" style="">
                Descubre tu mejor versión
            </p>
</div>
<!-- Central Visual: Elegant Silhouette -->
<div class="relative z-10 w-full max-w-4xl flex items-center justify-center flex-1 my-12 md:my-0">
<div class="relative w-full aspect-[4/5] md:aspect-video flex items-center justify-center">
<!-- Large Organic Shape -->
<div class="absolute inset-0 bg-surface-container-low rounded-[4rem] rotate-[-2deg] scale-105 pointer-events-none"></div>
<!-- Main Image Illustration -->
<div class="relative w-[90%] h-[90%] rounded-[3rem] overflow-hidden shadow-2xl editorial-shadow">
<img class="w-full h-full object-cover" data-alt="Silueta elegante y minimalista de una mujer a la moda bajo la cálida luz del atardecer con pose editorial de alta costura y fondo beige suave" src="https://i.pinimg.com/1200x/1a/e5/72/1ae572ee132fd794b51d19ffb2f6f894.jpg" style="">
<!-- Glassmorphism Style Tip Card (Asymmetric Overlap) -->
<div class="absolute bottom-8 -right-4 md:right-8 bg-surface/80 backdrop-blur-xl p-6 rounded-3xl max-w-[200px] editorial-shadow border border-white/20 hidden md:block">
<div class="flex items-center gap-2 mb-2 text-tertiary">
<span class="material-symbols-outlined text-lg" style="font-variation-settings: &quot;FILL&quot; 1;">auto_awesome</span>
<span class="font-label text-[10px] font-bold uppercase tracking-widest" style="">Estilo IA</span>
</div>
<p class="font-body text-sm leading-tight text-on-surface-variant" style="">
                            Tu paleta cromática ideal: Corales cálidos y tonos tierra.
                        </p>
</div>
</div>
<!-- Floating Decorative Element -->
<div class="absolute -top-6 left-12 w-24 h-24 rounded-full bg-secondary-container flex items-center justify-center editorial-shadow rotate-12">
<span class="material-symbols-outlined text-on-secondary-container text-4xl" style="">style</span>
</div>
</div>
</div>
<!-- Footer / Call to Action Section -->
<div class="relative z-10 w-full max-w-md text-center flex flex-col items-center gap-8">
<div class="flex flex-col gap-2">
<span class="font-label text-[10px] uppercase tracking-[0.3em] text-primary font-bold" style="">
                    El Taller Digital
                </span>
<p class="font-body text-on-surface-variant text-sm px-4" style="">
                    La precisión de la inteligencia artificial se encuentra con el arte del estilo personal.
                </p>
</div>
<!-- Primary Action Button -->
<button class="group relative w-full overflow-hidden rounded-full bg-gradient-to-r from-primary to-primary-container p-px editorial-shadow active:scale-95 transition-transform duration-200" style="">
<div class="relative flex items-center justify-center gap-3 bg-gradient-to-r from-primary to-primary-container px-10 py-5 rounded-full transition-all group-hover:bg-none group-hover:shadow-[inset_0_1px_0_rgba(255,255,255,0.4)]">
<span class="font-headline font-bold text-on-primary tracking-wide text-lg" style="">Comenzar</span>
<span class="material-symbols-outlined text-on-primary group-hover:translate-x-1 transition-transform" style="">arrow_forward</span>
</div>
</button>
<!-- Secondary/Login Prompt -->
<button class="text-on-surface-variant font-label text-xs font-semibold tracking-wide hover:text-primary transition-colors" style=""><br></button>
</div>
</main>
<!-- Suppressed Navigation as per Contextual Shell Rules for Welcome/Onboarding Screen -->
<!-- But keeping decorative shell elements if needed for branding continuity -->
<div class="fixed top-0 left-0 w-full p-6 flex justify-between items-center z-50 pointer-events-none">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-surface-container-high flex items-center justify-center">
<span class="material-symbols-outlined text-sm text-on-surface-variant" style="">diamond</span>
</div>
</div>
<div class="pointer-events-auto">
<button class="w-10 h-10 rounded-full bg-surface-container flex items-center justify-center editorial-shadow hover:bg-surface-container-highest transition-colors" style="">
<span class="material-symbols-outlined text-on-surface-variant" style="">language</span>
</button>
</div>
</div>
</body></html>
